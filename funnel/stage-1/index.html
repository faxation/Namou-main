<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What's your goal? — Namou Properties</title>
  <meta name="description" content="Tell us about your land acquisition goals in RAK. We'll match you with the right opportunities.">
  <meta property="og:title" content="What's your goal? — Namou Properties">
  <meta property="og:description" content="Tell us about your land acquisition goals in RAK.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://namou.ae/funnel/stage-1">
  <link rel="icon" href="../../assets/images/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="../../css/styles.css">
  <link rel="stylesheet" href="../../css/funnel.css">
</head>
<body>

  <!-- Navigation — logo + theme toggle only -->
  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="/" class="nav__logo">
        <img src="../../assets/images/logo.png" alt="Namou Properties" width="120" height="44">
      </a>
      <div class="nav__right">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <span class="material-symbols-outlined icon-moon">dark_mode</span>
          <span class="material-symbols-outlined icon-sun">light_mode</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="funnel-page">

    <!-- Progress — step 1 of 6 -->
    <div class="funnel-progress">
      <div class="funnel-progress__segment funnel-progress__segment--active"></div>
      <div class="funnel-progress__segment"></div>
      <div class="funnel-progress__segment"></div>
      <div class="funnel-progress__segment"></div>
      <div class="funnel-progress__segment"></div>
      <div class="funnel-progress__segment"></div>
    </div>

    <a href="/home" class="funnel-back">
      <span class="material-symbols-outlined">arrow_back</span>
      Back
    </a>

    <div class="funnel-stage">
      <h1 class="funnel-stage__title">What's your goal?</h1>
      <p class="funnel-stage__subtitle">Pick the closest fit.</p>

      <div class="funnel-options" id="goalOptions">
        <button class="funnel-option" data-value="sale" type="button">
          <span class="funnel-option__title">Buy a plot to hold or flip</span>
          <span class="funnel-option__subtitle">Sale deal · land only</span>
        </button>
        <button class="funnel-option" data-value="jv-build-sell" type="button">
          <span class="funnel-option__title">Build and sell with a partner</span>
          <span class="funnel-option__subtitle">JV · build-sell</span>
        </button>
        <button class="funnel-option" data-value="jv-build-lease" type="button">
          <span class="funnel-option__title">Build and lease with a partner</span>
          <span class="funnel-option__subtitle">JV · build-lease</span>
        </button>
        <button class="funnel-option" data-value="jv-build-hotel" type="button">
          <span class="funnel-option__title">Build and hand to hotel operator</span>
          <span class="funnel-option__subtitle">JV · build-hotel</span>
        </button>
      </div>
    </div>

  </main>

  <script src="../../js/main.js"></script>
  <script src="../../js/funnel.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Set intent on funnel entry
      Funnel.setState({ intent: 'buy' });

      // Restore previous selection if returning via Back
      var state = Funnel.getState();
      if (state.goal) {
        var prev = document.querySelector('[data-value="' + state.goal + '"]');
        if (prev) prev.classList.add('funnel-option--selected');
      }

      // Selection auto-advances to stage 2
      var options = document.querySelectorAll('#goalOptions .funnel-option');
      options.forEach(function(option) {
        option.addEventListener('click', function() {
          var value = this.getAttribute('data-value');
          Funnel.setState({ goal: value });
          window.location.href = '/funnel/stage-2';
        });
      });
    });
  </script>
</body>
</html>
