<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Capital position — Namou Properties</title>
  <meta name="description" content="Tell us your budget range so we can match plots in RAK.">
  <link rel="icon" href="../../assets/images/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="../../css/styles.css">
  <link rel="stylesheet" href="../../css/funnel.css">
</head>
<body>

  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="/" class="nav__logo">
        <img src="../../assets/images/logo.png" alt="Namou Properties" width="120" height="44">
      </a>
      <div class="nav__right">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <span class="material-symbols-outlined icon-moon">dark_mode</span>
          <span class="material-symbols-outlined icon-sun">light_mode</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="funnel-page">

    <div class="funnel-progress">
      <div class="funnel-progress__segment funnel-progress__segment--complete"></div>
      <div class="funnel-progress__segment funnel-progress__segment--active"></div>
      <div class="funnel-progress__segment"></div>
      <div class="funnel-progress__segment"></div>
      <div class="funnel-progress__segment"></div>
      <div class="funnel-progress__segment"></div>
    </div>

    <a href="/funnel/stage-1" class="funnel-back">
      <span class="material-symbols-outlined">arrow_back</span>
      Back
    </a>

    <div class="funnel-stage">
      <h1 class="funnel-stage__title">What's your capital position?</h1>
      <p class="funnel-stage__subtitle">We'll match plots in your range.</p>

      <div class="funnel-options" id="budgetOptions">
        <button class="funnel-option" data-value="under-2m" type="button">
          <span class="funnel-option__title">Under AED 2M</span>
          <span class="funnel-option__subtitle">Entry plots, mainland zones</span>
        </button>
        <button class="funnel-option" data-value="2-10m" type="button">
          <span class="funnel-option__title">AED 2M – 10M</span>
          <span class="funnel-option__subtitle">Most JV partners sit here</span>
        </button>
        <button class="funnel-option" data-value="10-30m" type="button">
          <span class="funnel-option__title">AED 10M – 30M</span>
          <span class="funnel-option__subtitle">Marjan, Hamra prime</span>
        </button>
        <button class="funnel-option" data-value="30m-plus" type="button">
          <span class="funnel-option__title">AED 30M+</span>
          <span class="funnel-option__subtitle">Hospitality, full-floor mixed use</span>
        </button>
        <button class="funnel-option" data-value="unsure" type="button">
          <span class="funnel-option__title">Not sure yet</span>
        </button>
      </div>
    </div>

  </main>

  <script src="../../js/main.js"></script>
  <script src="../../js/funnel.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var state = Funnel.getState();
      if (state.budgetBand) {
        var prev = document.querySelector('[data-value="' + state.budgetBand + '"]');
        if (prev) prev.classList.add('funnel-option--selected');
      }

      var options = document.querySelectorAll('#budgetOptions .funnel-option');
      options.forEach(function(option) {
        option.addEventListener('click', function() {
          Funnel.setState({ budgetBand: this.getAttribute('data-value') });
          window.location.href = '/funnel/stage-3';
        });
      });
    });
  </script>
</body>
</html>
