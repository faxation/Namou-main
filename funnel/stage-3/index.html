<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timeline and profile — Namou Properties</title>
  <meta name="description" content="A few more details to narrow your land search in RAK.">
  <link rel="icon" href="../../assets/images/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="../../css/styles.css">
  <link rel="stylesheet" href="../../css/funnel.css">
</head>
<body>

  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="/" class="nav__logo">
        <img src="../../assets/images/logo.png" alt="Namou Properties" width="120" height="44">
      </a>
      <div class="nav__right">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <span class="material-symbols-outlined icon-moon">dark_mode</span>
          <span class="material-symbols-outlined icon-sun">light_mode</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="funnel-page">

    <div class="funnel-progress">
      <div class="funnel-progress__segment funnel-progress__segment--complete"></div>
      <div class="funnel-progress__segment funnel-progress__segment--complete"></div>
      <div class="funnel-progress__segment funnel-progress__segment--active"></div>
      <div class="funnel-progress__segment"></div>
      <div class="funnel-progress__segment"></div>
      <div class="funnel-progress__segment"></div>
    </div>

    <a href="/funnel/stage-2" class="funnel-back">
      <span class="material-symbols-outlined">arrow_back</span>
      Back
    </a>

    <div class="funnel-stage">
      <h1 class="funnel-stage__title">A few more details</h1>
      <p class="funnel-stage__subtitle">Helps us narrow the match.</p>

      <div class="funnel-field">
        <span class="funnel-field__label">Timeline to close</span>
        <div class="funnel-chips" id="timelineChips">
          <button class="funnel-chip" data-value="30-days" type="button">Within 30 days</button>
          <button class="funnel-chip" data-value="1-3-months" type="button">1–3 months</button>
          <button class="funnel-chip" data-value="3-6-months" type="button">3–6 months</button>
          <button class="funnel-chip" data-value="exploring" type="button">Just exploring</button>
        </div>
      </div>

      <div class="funnel-field">
        <span class="funnel-field__label">Funds ready</span>
        <div class="funnel-chips" id="fundingChips">
          <button class="funnel-chip" data-value="cash" type="button">Cash available</button>
          <button class="funnel-chip" data-value="mortgage-approved" type="button">Mortgage pre-approved</button>
          <button class="funnel-chip" data-value="arranging" type="button">Arranging finance</button>
        </div>
      </div>

      <div class="funnel-field">
        <span class="funnel-field__label">Investor profile</span>
        <div class="funnel-chips" id="profileChips">
          <button class="funnel-chip" data-value="uae-resident" type="button">UAE resident</button>
          <button class="funnel-chip" data-value="gcc-national" type="button">GCC national</button>
          <button class="funnel-chip" data-value="international" type="button">International</button>
        </div>
      </div>
    </div>

    <div class="funnel-continue">
      <button class="btn" id="continueBtn" type="button" disabled>Continue</button>
    </div>

  </main>

  <script src="../../js/main.js"></script>
  <script src="../../js/funnel.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      Funnel.initChips('timelineChips', 'timeline', 'single');
      Funnel.initChips('fundingChips', 'funding', 'single');
      Funnel.initChips('profileChips', 'investorProfile', 'single');

      function checkComplete() {
        var state = Funnel.getState();
        Funnel.toggleContinue('continueBtn', !!(state.timeline && state.funding && state.investorProfile));
      }

      checkComplete();

      document.getElementById('timelineChips').addEventListener('chipchange', checkComplete);
      document.getElementById('fundingChips').addEventListener('chipchange', checkComplete);
      document.getElementById('profileChips').addEventListener('chipchange', checkComplete);

      document.getElementById('continueBtn').addEventListener('click', function() {
        if (!this.disabled) window.location.href = '/funnel/stage-4';
      });
    });
  </script>
</body>
</html>
