<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening WhatsApp — Namou Properties</title>
  <meta name="description" content="Redirecting to WhatsApp with your land investment brief.">
  <link rel="icon" href="../../assets/images/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="../../css/styles.css">
  <link rel="stylesheet" href="../../css/funnel.css">
</head>
<body>

  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="/" class="nav__logo">
        <img src="../../assets/images/logo.png" alt="Namou Properties" width="120" height="44">
      </a>
      <div class="nav__right">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <span class="material-symbols-outlined icon-moon">dark_mode</span>
          <span class="material-symbols-outlined icon-sun">light_mode</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="funnel-page">

    <div class="funnel-stage">
      <div class="funnel-handoff">
        <h1 class="funnel-handoff__title">Opening WhatsApp…</h1>
        <p class="funnel-handoff__subtitle">If nothing happens, tap the button below.</p>

        <div class="funnel-handoff__fallback">
          <a class="btn" id="fallbackBtn" href="#" target="_blank" rel="noopener">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            Open WhatsApp
          </a>
        </div>

        <!-- Score badge — visible in dev mode only -->
        <div class="funnel-handoff__score" id="scoreBadge" style="display: none;"></div>
      </div>
    </div>

  </main>

  <script src="../../js/main.js"></script>
  <script src="../../js/funnel.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      var state = Funnel.getState();
      var link = Funnel.buildWhatsAppLink(state);

      // Set fallback button
      var fallbackBtn = document.getElementById('fallbackBtn');
      if (fallbackBtn) {
        fallbackBtn.href = link;
        fallbackBtn.style.backgroundColor = 'var(--color-green)';
        fallbackBtn.style.color = '#fff';
        fallbackBtn.style.borderColor = 'var(--color-green)';
        fallbackBtn.style.borderRadius = '12px';
      }

      // Dev-only score badge
      var scoreEl = document.getElementById('scoreBadge');
      if (scoreEl) {
        scoreEl.textContent = 'Score: ' + state.score + '/100 \u00b7 tier: ' + (state.tier || 'unscored');
        var isDev = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
        if (isDev) scoreEl.style.display = 'block';
      }

      // Auto-redirect after 1.5 seconds
      setTimeout(function() {
        window.location.href = link;
      }, 1500);
    });
  </script>
</body>
</html>
