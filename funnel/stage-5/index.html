<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your indicative ROI — Namou Properties</title>
  <meta name="description" content="See indicative returns for your land investment in RAK.">
  <link rel="icon" href="../../assets/images/logo.png" type="image/png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet">
  <link rel="stylesheet" href="../../css/styles.css">
  <link rel="stylesheet" href="../../css/funnel.css">
</head>
<body>

  <nav class="nav" id="nav">
    <div class="nav__inner">
      <a href="/" class="nav__logo">
        <img src="../../assets/images/logo.png" alt="Namou Properties" width="120" height="44">
      </a>
      <div class="nav__right">
        <button class="theme-toggle" id="themeToggle" aria-label="Toggle dark mode">
          <span class="material-symbols-outlined icon-moon">dark_mode</span>
          <span class="material-symbols-outlined icon-sun">light_mode</span>
        </button>
      </div>
    </div>
  </nav>

  <main class="funnel-page">

    <div class="funnel-progress">
      <div class="funnel-progress__segment funnel-progress__segment--complete"></div>
      <div class="funnel-progress__segment funnel-progress__segment--complete"></div>
      <div class="funnel-progress__segment funnel-progress__segment--complete"></div>
      <div class="funnel-progress__segment funnel-progress__segment--complete"></div>
      <div class="funnel-progress__segment funnel-progress__segment--active"></div>
      <div class="funnel-progress__segment"></div>
    </div>

    <a href="/funnel/stage-4" class="funnel-back">
      <span class="material-symbols-outlined">arrow_back</span>
      Back
    </a>

    <div class="funnel-stage">
      <h1 class="funnel-stage__title">Your indicative ROI</h1>
      <p class="funnel-stage__subtitle" id="roiContext">Based on your selections.</p>

      <div class="funnel-roi">
        <div class="funnel-roi__grid">
          <div class="funnel-roi__item">
            <span class="funnel-roi__label">Land cost</span>
            <span class="funnel-roi__value" id="roiLandCost">—</span>
          </div>
          <div class="funnel-roi__item">
            <span class="funnel-roi__label">Build cost</span>
            <span class="funnel-roi__value" id="roiBuildCost">—</span>
          </div>
          <div class="funnel-roi__item">
            <span class="funnel-roi__label">Projected GDV</span>
            <span class="funnel-roi__value" id="roiGdv">—</span>
          </div>
          <div class="funnel-roi__item">
            <span class="funnel-roi__label">Profit margin</span>
            <span class="funnel-roi__value" id="roiMargin">—</span>
          </div>
        </div>
      </div>

      <div class="funnel-matches" id="matchPreview">
        <div class="funnel-match-card">
          <div class="funnel-match-card__title">Loading matches…</div>
          <div class="funnel-match-card__detail"></div>
        </div>
      </div>
    </div>

    <div class="funnel-continue">
      <button class="btn" id="continueBtn" type="button">See my matches on WhatsApp →</button>
    </div>

  </main>

  <script src="../../js/main.js"></script>
  <script src="../../js/funnel.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Mark value moment as viewed (+10 to score)
      Funnel.setState({ viewedValueMoment: true });

      var state = Funnel.getState();

      // ROI calculation
      var roi = Funnel.calculateROI(state);
      document.getElementById('roiLandCost').textContent  = Funnel.formatAED(roi.landCost);
      document.getElementById('roiBuildCost').textContent = Funnel.formatAED(roi.buildCost);
      document.getElementById('roiGdv').textContent       = Funnel.formatAED(roi.gdv);
      document.getElementById('roiMargin').textContent    = roi.margin + '%';

      // Context subtitle
      var parts = [];
      if (state.budgetBand && Funnel.LABELS.budgetBand[state.budgetBand]) {
        parts.push(Funnel.LABELS.budgetBand[state.budgetBand]);
      }
      if (state.sizeBand && Funnel.LABELS.sizeBand[state.sizeBand]) {
        parts.push(Funnel.LABELS.sizeBand[state.sizeBand]);
      }
      if (state.zoning && state.zoning.length) {
        parts.push(state.zoning[0]);
      }
      if (state.zones && state.zones.length) {
        parts.push(state.zones[0]);
      }
      if (parts.length) {
        document.getElementById('roiContext').textContent = 'Based on ' + parts.join(' \u00b7 ');
      }

      // Load matched plots
      fetch('../../data/plots.json')
        .then(function(r) { return r.json(); })
        .then(function(plots) {
          var result = Funnel.matchPlots(state, plots);
          var container = document.getElementById('matchPreview');

          if (result.state === 'perfect' || result.state === 'partial') {
            var html = '';
            var label = result.state === 'partial' ? ' (close match)' : '';
            result.plots.slice(0, 3).forEach(function(plot) {
              html += '<div class="funnel-match-card">';
              html += '<div class="funnel-match-card__title">' + escapeHtml(plot.title) + label + '</div>';
              html += '<div class="funnel-match-card__detail">';
              html += escapeHtml(plot.zone) + ' \u00b7 ' + escapeHtml(plot.zoning) + '<br>';
              html += Funnel.formatAED(plot.price_aed) + ' \u00b7 ' + plot.size_sqft.toLocaleString() + ' sqft';
              html += '</div></div>';
            });
            container.innerHTML = html;
          } else {
            container.innerHTML =
              '<div class="funnel-match-card">' +
              '<div class="funnel-match-card__title">We\u2019re sourcing this</div>' +
              '<div class="funnel-match-card__detail">Leave your details and we\u2019ll be in touch within 24 hours with matched opportunities.</div>' +
              '</div>';
          }
        })
        .catch(function() {
          document.getElementById('matchPreview').innerHTML =
            '<div class="funnel-match-card">' +
            '<div class="funnel-match-card__title">We\u2019re sourcing this</div>' +
            '<div class="funnel-match-card__detail">Leave your details and we\u2019ll be in touch within 24 hours.</div>' +
            '</div>';
        });

      document.getElementById('continueBtn').addEventListener('click', function() {
        window.location.href = '/funnel/stage-6';
      });

      function escapeHtml(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
      }
    });
  </script>
</body>
</html>
